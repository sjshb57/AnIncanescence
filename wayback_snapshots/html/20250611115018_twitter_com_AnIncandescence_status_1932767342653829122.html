<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta content="text/html; charset=utf-8" http-equiv="content-type"/>
<title>
Wayback Machine
</title>
<style type="text/css">
body {
				margin:0;
				padding: 20px;
				background-color: #000;
				min-height: 100vh;
				box-sizing: border-box;
			}
  .notice {
    border: 2px solid #c9ae00;
    background-color: #ffff00;
    padding: 12px;
    position: sticky;
    top: 20px;
    z-index: 1000;
  }

  .tweet-container {
    font-family: Helvetica, Arial, sans-serif;
    padding: 12px 16px;
    border: 1px solid #cfd9de;
    border-radius: 12px;
    margin-top: 20px;
				margin-left: auto;
				margin-right: auto;
				background-color: white;
    max-width: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    max-width: max-content;
  }

  .tweet-container > #nonjsonview {
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;

  }

  .tweet-author {
    display: flex;
    flex-direction: row;
    align-items: center;
    padding-bottom: 0.75rem;
  }

  .tweet-author-profile-image img {
    width: 48px;
    max-width: 48px;
    height: 48px;
    max-height: 48px;
    overflow: hidden;
    border-radius: 50%;
    margin-right: 5px;
  }

  .tweet-author-info {
    display: flex;
    flex-direction: column;
  }

  .tweet-author-name {
    font-weight: bold;
  }

  .tweet-content {
    font-size: 1.25rem;
  }

			.tweet-image {
				width: 100%;
				height: auto;
				margin-top: 12px;
				border-radius: 12px;
			}

			.embedded-tweet-container {
				box-sizing: border-box;
				margin-top: 12px;
				padding: 12px;
				border: 1px solid #cfd9de;
    border-radius: 12px;
				background-color: white;
				max-width: 100%;
			}
			.date {
				font-size: 0.75rem;
				color: #657786;
				margin-top: 12px;
			}
			.date a {
				color: #657786;
				text-decoration: none;
			}
			.date a:hover {
				text-decoration: underline;
			}
  .on {
    display: block;
  }
  .off {
    display: none;
  }
</style>
</head>
<body>
<div class="tweet-container on">
<div id="nonjsonview">
  <div class="tweet-author">
  <div class="tweet-author-profile-image">
  <img alt="炽烈已极" src="../avatar/avatar_2034869645342076928.jpg"/>
  </div>
  <div class="tweet-author-info">
  <div class="tweet-author-name">
  炽烈已极
  </div>
  <div class="tweet-author-username">
  @AnIncandescence
  </div>
  </div>
  </div>
  <div class="tweet-content">
  半片氯硝让幽灵退回了阴影中
  <br/>
  <br/>
  有时候感觉这个前台系统很蠢。自伤自杀的冲动在某几个小时内占据了大部分内存，身处其中时只能看它们演化和增殖，无暇思考其他
  <br/>
  但是站在那之外，它又能被轻而易举地干预，一场热带风暴的幻觉
  <br/>
  <br/>
  就像这盒刀片，它没有开封，但就在一个不打眼的角落，我没有办法抹去它的存在
  <!-- If there's a quoted tweet, embed it here!-->
  <p class="date">
  <a href="/" id="parentdate">
  </a>
  </p>
  </div>
</div>
</div>
<script>
var dateString = "2025-06-11T11:50:18.000Z";
  var date = new Date(dateString);
  var currentURL = window.location.href;
  document.querySelector("#parentdate").innerText = date;
  document.querySelector("#parentdate").href = currentURL;
</script>
</body>
</html>
