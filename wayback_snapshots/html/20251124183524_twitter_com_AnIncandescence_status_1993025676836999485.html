  }

  .tweet-author {
    display: flex;
    flex-direction: row;
    align-items: center;
    padding-bottom: 0.75rem;
  }

  .tweet-author-profile-image img {

    height: 48px;
    max-height: 48px;
    overflow: hidden;
    border-radius: 50%;
    margin-right: 5px;
  }

  .tweet-author-info {

  }

  .tweet-author-name {
    font-weight: bold;
  }

  .tweet-content {

  }

				color: #657786;
				margin-top: 12px;
			}
			.date a {
				color: #657786;
				text-decoration: none;
			}
			.date a:hover {
				text-decoration: underline;
			}
  .on {
    display: block;
  }
  .off {
    display: none;
