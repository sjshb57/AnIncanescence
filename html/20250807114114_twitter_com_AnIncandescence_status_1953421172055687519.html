<style type="text/css">
body {
				margin:0;
				padding: 20px;
				background-color: #000;

			}

    padding: 12px;

    z-index: 1000;
  }

  .tweet-container {

    flex-direction: column;
    justify-content: center;
    align-items: center;
    max-width: max-content;
  }

  .tweet-container > #nonjsonview {
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;

  }

  .tweet-author {
    display: flex;
    flex-direction: row;
    align-items: center;
    padding-bottom: 0.75rem;
  }

  .tweet-author-profile-image img {
    width: 48px;
    max-width: 48px;
    height: 48px;
    max-height: 48px;
    overflow: hidden;
    border-radius: 50%;
    margin-right: 5px;
  }

  .tweet-author-info {
    display: flex;
    flex-direction: column;
  }

  .tweet-author-name {
    font-weight: bold;
  }

  .tweet-content {
    font-size: 1.25rem;
  }

			.tweet-image {
				width: 100%;
				height: auto;
				margin-top: 12px;
				border-radius: 12px;
			}

			.embedded-tweet-container {

				margin-top: 12px;

				border: 1px solid #cfd9de;
    border-radius: 12px;
				background-color: white;
				max-width: 100%;
			}
			.date {
				font-size: 0.75rem;
				color: #657786;
				margin-top: 12px;
			}
			.date a {
				color: #657786;
				text-decoration: none;
			}
			.date a:hover {
				text-decoration: underline;
			}
  .on {
    display: block;
  }
  .off {
    display: none;
  }
</style>
</head>
